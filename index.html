// ─── TOAST ────────────────────────────────────────────────────────
function Toast({ toasts, removeToast }) {
  return (
    <div className="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none" style={{maxWidth:320}}>
      {toasts.map(t => (
        <div key={t.id} className={`flex items-center gap-3 px-4 py-3 rounded-2xl shadow-2xl text-white text-sm font-semibold animate-bounce-in pointer-events-auto
          ${t.type==='success'?'bg-emerald-500':t.type==='error'?'bg-rose-500':t.type==='warning'?'bg-amber-500':'bg-sky-500'}`}>
          {t.type==='success'?<CheckCirc2Icon className="w-5 h-5 shrink-0"/>:
           t.type==='error'  ?<XCircIcon className="w-5 h-5 shrink-0"/>:
           t.type==='warning'?<AlertCircIcon className="w-5 h-5 shrink-0"/>:
                              <InfoIcon className="w-5 h-5 shrink-0"/>}
          <span className="flex-1">{t.message}</span>
          <button onClick={()=>removeToast(t.id)} className="opacity-70 hover:opacity-100 ml-2"><XIcon className="w-4 h-4"/></button>
        </div>
      ))}
    </div>
  );
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────
function ProgressBar({ value, max=100, color="sky", size="md" }) {
  const pct = Math.min(100, Math.round((value/max)*100));
  const colors = { sky:"bg-sky-500", rose:"bg-rose-500", emerald:"bg-emerald-500", amber:"bg-amber-500", violet:"bg-violet-500", slate:"bg-slate-300" };
  const heights = { sm:"h-1.5", md:"h-2.5", lg:"h-3.5" };
  return (
    <div className={`w-full bg-slate-100 rounded-full ${heights[size]} overflow-hidden`}>
      <div className={`${colors[color]||'bg-slate-300'} ${heights[size]} rounded-full transition-all duration-700`} style={{width:`${pct}%`}}/>
    </div>
  );
}

// ─── STAT CARD ────────────────────────────────────────────────────
function StatCard({ icon: Ic2, label, value, sub, color="sky", trend }) {
  const cls = {
    sky:"bg-sky-50 text-sky-600 border-sky-100",
    rose:"bg-rose-50 text-rose-600 border-rose-100",
    emerald:"bg-emerald-50 text-emerald-600 border-emerald-100",
    amber:"bg-amber-50 text-amber-600 border-amber-100",
    violet:"bg-violet-50 text-violet-600 border-violet-100",
  };
  return (
    <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm hover:shadow-md transition-all duration-200 hover:-translate-y-0.5">
      <div className="flex items-center justify-between mb-3">
        <div className={`w-11 h-11 rounded-xl flex items-center justify-center border ${cls[color]}`}>
          <Ic2 className="w-5 h-5"/>
        </div>
        {trend!=null&&(
          <span className={`text-xs font-bold px-2 py-1 rounded-full ${trend>=0?'bg-emerald-50 text-emerald-600':'bg-rose-50 text-rose-600'}`}>
            {trend>=0?'↑':'↓'} {Math.abs(trend)}%
          </span>
        )}
      </div>
      <div className="text-2xl font-extrabold text-slate-900">{value}</div>
      <div className="text-sm font-semibold text-slate-500 mt-0.5">{label}</div>
      {sub&&<div className="text-xs text-slate-400 mt-1">{sub}</div>}
    </div>
  );
}

// ─── BADGE ────────────────────────────────────────────────────────
function Badge({ children, color="sky" }) {
  const cls = {
    sky:"bg-sky-100 text-sky-700", rose:"bg-rose-100 text-rose-700",
    emerald:"bg-emerald-100 text-emerald-700", amber:"bg-amber-100 text-amber-700",
    violet:"bg-violet-100 text-violet-700", slate:"bg-slate-100 text-slate-600",
  };
  return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-bold ${cls[color]||cls.slate}`}>{children}</span>;
}

// ─── MODULE CARD ──────────────────────────────────────────────────
function ModuleCard({ mod, isPremium, onStart, onUpgrade }) {
  const locked = mod.premium && !isPremium;
  const IcMod = mod.icon;
  return (
    <div className={`relative bg-white border rounded-2xl p-6 flex flex-col transition-all duration-200
      ${locked?'border-slate-200 opacity-80':'border-slate-200 hover:border-sky-300 hover:shadow-lg hover:-translate-y-0.5'}
      ${mod.borderColor||''}`}>
      {locked&&(
        <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center rounded-2xl">
          <div className="w-14 h-14 bg-slate-50 border border-slate-200 rounded-2xl flex items-center justify-center mb-3">
            <LockIcon className="w-7 h-7 text-slate-400"/>
          </div>
          <p className="font-bold text-slate-700 text-sm mb-1">Eksklusif Premium</p>
          <button onClick={onUpgrade} className="text-xs font-semibold text-sky-600 hover:underline">Buka Akses Modul →</button>
        </div>
      )}
      <div className="flex justify-between items-start mb-4">
        <div className={`w-12 h-12 ${mod.iconBg} rounded-xl flex items-center justify-center ${mod.iconColor}`}>
          <IcMod className="w-6 h-6"/>
        </div>
        <div className="flex gap-2">
          {mod.premium?<Badge color="violet">Premium</Badge>:<Badge color="emerald">Gratis</Badge>}
          {mod.isNew&&<Badge color="rose">Baru</Badge>}
        </div>
      </div>

                          <p className="text-xs text-slate-500">{m.duration} · {m.ageGroup} · ⭐ {m.rating}</p>
                        </div>
                        <div className="flex items-center gap-2 shrink-0">
                          <Badge color={m.premium?"violet":"emerald"}>{m.premium?"Premium":"Gratis"}</Badge>
                          <button onClick={()=>addToast(`Edit: ${m.title}`,"info")} className="text-xs font-semibold text-slate-500 hover:text-sky-600 border border-slate-200 px-3 py-1.5 rounded-lg transition">Edit</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            {adminTab==="revenue"&&(
              <div className="space-y-5">
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                  <StatCard icon={TrendUpIcon} label="Pendapatan Bulan Ini" value="Rp 5.2jt" color="emerald" trend={8}/>
                  <StatCard icon={UsersIcon} label="Pelanggan Premium" value="104" color="sky" trend={12}/>
                  <StatCard icon={TargetIcon} label="Target Tercapai" value="65%" color="amber"/>
                </div>
                <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
                  <h3 className="font-extrabold text-slate-800 mb-5">Breakdown per Paket</h3>
                  <div className="space-y-4">
                    {[
                      {name:"Paket Keluarga (Rp 50rb/bln)",count:78,revenue:"Rp 3.9jt",pct:75,color:"sky"},
                      {name:"Paket Instansi (Rp 250rb/bln)",count:5,revenue:"Rp 1.25jt",pct:24,color:"violet"},
                      {name:"Akun Gratis",count:1165,revenue:"Rp 0",pct:0,color:"slate"},
                    ].map(r=>(
                      <div key={r.name}>
                        <div className="flex justify-between text-sm mb-1.5">
                          <span className="font-semibold text-slate-700">{r.name}</span>
                          <span className="text-slate-400 text-xs">{r.count} pengguna · {r.revenue}</span>
                        </div>
                        <ProgressBar value={r.pct} color={r.color}/>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      </div>
    );
  };

  // ── ROUTER ────────────────────────────────────────────────────────
  return (
    <>
      <Toast toasts={toasts} removeToast={removeToast}/>
      {view==="login"    && <AuthPage isLogin={true}/>}
      {view==="register" && <AuthPage isLogin={false}/>}
      {view==="dashboard"&& <UserDashboard/>}
      {view==="payment"  && <PaymentPage/>}
      {view==="admin"    && <AdminDashboard/>}
      {(view==="landing"||!["login","register","dashboard","payment","admin"].includes(view)) && <LandingPage/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
